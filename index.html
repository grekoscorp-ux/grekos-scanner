<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grekos Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f0f0; min-height: 100vh; }
  .header { background: #111; color: white; padding: 16px 20px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
  .header p { font-size: 11px; color: #888; margin-top: 2px; }
  .container { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  #qr-video { width: 100%; border-radius: 10px; background: #000; display: block; }
  .btn-scan { width: 100%; background: #111; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  .btn-scan:active { background: #333; }
  .sep { text-align: center; color: #aaa; font-size: 12px; margin: 10px 0; }
  .search-group { display: flex; gap: 8px; }
  .search-group input { flex: 1; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; }
  .search-group input:focus { border-color: #111; }
  .btn-buscar { background: #111; color: white; border: none; border-radius: 8px; padding: 12px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .producto-nombre { font-size: 17px; font-weight: 800; color: #111; margin-bottom: 6px; }
  .precio-base { font-size: 13px; color: #666; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
  .filtros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
  .filtro-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  select { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: white; outline: none; cursor: pointer; }
  select:focus { border-color: #111; }
  .resultado { border-radius: 12px; padding: 20px; text-align: center; margin-top: 4px; }
  .resultado.hay { background: #d4edda; border: 2px solid #28a745; }
  .resultado.nohay { background: #f8d7da; border: 2px solid #dc3545; }
  .resultado .emoji { font-size: 44px; margin-bottom: 6px; }
  .resultado .status { font-size: 22px; font-weight: 800; }
  .resultado.hay .status { color: #155724; }
  .resultado.nohay .status { color: #721c24; }
  .stock-num { font-size: 40px; font-weight: 900; color: #155724; margin: 4px 0; }
  .info-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.6); border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
  .info-row span { font-size: 12px; color: #666; }
  .info-row strong { font-size: 14px; color: #222; }
  .hidden { display: none; }
  .spinner { text-align: center; padding: 16px; color: #888; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1>GREKOS SCANNER</h1>
  <p>Sistema de inventario</p>
</div>

<div class="container">

  <div class="card">
    <div class="label">Escanear producto</div>
    <video id="qr-video" class="hidden" playsinline></video>
    <button class="btn-scan" id="btnScan" onclick="toggleScan()">📷 Abrir cámara</button>
    <div class="sep">— o busca por código —</div>
    <div class="search-group">
      <input type="text" id="inputCodigo" placeholder="Ej: P001" onkeydown="if(event.key==='Enter') buscarPorCodigo(this.value.trim())" />
      <button class="btn-buscar" onclick="buscarPorCodigo(document.getElementById('inputCodigo').value.trim())">Buscar</button>
    </div>
    <div id="spinnerBusqueda" class="spinner hidden">Buscando...</div>
  </div>

  <div class="card hidden" id="cardFiltros">
    <div class="producto-nombre" id="nombreProducto"></div>
    <div class="precio-base" id="precioBase"></div>
    <div class="label">Selecciona variante</div>
    <div class="filtros-grid">
      <div>
        <div class="filtro-label">Color</div>
        <select id="selectColor" onchange="verificarStock()">
          <option value="">-- Color --</option>
        </select>
      </div>
      <div>
        <div class="filtro-label">Talla</div>
        <select id="selectTalla" onchange="verificarStock()">
          <option value="">-- Talla --</option>
        </select>
      </div>
    </div>
    <div id="resultadoStock"></div>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwjZJ9u_9Wee43Q9Hd-KGzJvPcwzKp4YlDUJ9R-I_S1fuNz0sg6AAuwhXnA0E7r_xvtow/exec";

const COLORES = ["negro","blanco","rojo","azul","plomo","celeste","verde","amarillo","rosado","morado","camuflado","gris","naranja","ngr","blc","plm","cls","cmf","amr","rsd","mrd"];
const TALLAS  = ["XS","S","M","L","XL","XXL","XXXL","28","29","30","31","32","33","34","36","38","40","42","44","UNICA"];

let todosLosProductos = [];
let scanActivo = false;
let stream = null;

async function toggleScan() {
  if (scanActivo) { detenerScan(); return; }
  scanActivo = true;
  document.getElementById("btnScan").textContent = "⏹ Detener cámara";
  const video = document.getElementById("qr-video");
  video.classList.remove("hidden");
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    video.play();
    requestAnimationFrame(leerQR);
  } catch(e) {
    alert("No se pudo acceder a la cámara");
    detenerScan();
  }
}

function detenerScan() {
  scanActivo = false;
  document.getElementById("btnScan").textContent = "📷 Abrir cámara";
  document.getElementById("qr-video").classList.add("hidden");
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function leerQR() {
  if (!scanActivo) return;
  const video = document.getElementById("qr-video");
  if (video.readyState !== video.HAVE_ENOUGH_DATA) { requestAnimationFrame(leerQR); return; }
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height);
  if (code) {
    detenerScan();
    buscarPorCodigo(code.data.trim());
  } else {
    requestAnimationFrame(leerQR);
  }
}

async function buscarPorCodigo(codigo) {
  if (!codigo) return;
  document.getElementById("spinnerBusqueda").classList.remove("hidden");
  document.getElementById("cardFiltros").classList.add("hidden");
  try {
    const res = await fetch(`${API}?codigo=${encodeURIComponent(codigo)}`);
    const data = await res.json();
    if (!data || data.length === 0) {
      document.getElementById("spinnerBusqueda").classList.add("hidden");
      alert("Producto no encontrado: " + codigo);
      return;
    }
    const nombreBase = extraerNombreBase(data[0].descripcion);
    await buscarVariantes(nombreBase, data[0].precio);
  } catch(e) {
    document.getElementById("spinnerBusqueda").classList.add("hidden");
    alert("Error al conectar con el inventario");
  }
}

async function buscarVariantes(nombreBase, precio) {
  try {
    const res = await fetch(`${API}?busqueda=${encodeURIComponent(nombreBase)}`);
    const data = await res.json();
    document.getElementById("spinnerBusqueda").classList.add("hidden");
    if (!data || data.length === 0) { alert("Sin variantes"); return; }
    todosLosProductos = data;

    const coloresSet = new Set();
    const tallasSet  = new Set();
    data.forEach(p => {
      const desc  = p.descripcion.toLowerCase();
      const words = desc.split(" ");
      COLORES.forEach(c => { if (desc.includes(c.toLowerCase())) coloresSet.add(c); });
      TALLAS.forEach(t  => { if (words.includes(t.toLowerCase()))  tallasSet.add(t); });
    });

    document.getElementById("nombreProducto").textContent = nombreBase.toUpperCase();
    document.getElementById("precioBase").innerHTML = precio ? `Precio base: <strong>S/ ${parseFloat(precio).toFixed(2)}</strong>` : "";
    llenarSelect("selectColor", [...coloresSet]);
    llenarSelect("selectTalla",  [...tallasSet]);
    document.getElementById("cardFiltros").classList.remove("hidden");
    document.getElementById("resultadoStock").innerHTML = "";
  } catch(e) {
    document.getElementById("spinnerBusqueda").classList.add("hidden");
    alert("Error al cargar variantes");
  }
}

function llenarSelect(id, opciones) {
  const sel = document.getElementById(id);
  const esColor = id === "selectColor";
  sel.innerHTML = `<option value="">-- ${esColor ? "Color" : "Talla"} --</option>`;
  opciones.forEach(op => {
    const opt = document.createElement("option");
    opt.value = op; opt.textContent = op.toUpperCase();
    sel.appendChild(opt);
  });
}

function verificarStock() {
  const color = document.getElementById("selectColor").value;
  const talla = document.getElementById("selectTalla").value;
  if (!color || !talla) { document.getElementById("resultadoStock").innerHTML = ""; return; }

  const match = todosLosProductos.find(p => {
    const desc  = p.descripcion.toLowerCase();
    const words = desc.split(" ");
    return desc.includes(color.toLowerCase()) && words.includes(talla.toLowerCase());
  });

  const div = document.getElementById("resultadoStock");
  if (match && parseInt(match.stock) > 0) {
    div.innerHTML = `
      <div class="resultado hay">
        <div class="emoji">✅</div>
        <div class="status">HAY STOCK</div>
        <div class="stock-num">${match.stock}</div>
        <div style="font-size:12px;color:#155724;">unidades disponibles</div>
        <div class="info-row"><span>📍 Ubicación</span><strong>${match.ubicacion || "—"}</strong></div>
        <div class="info-row"><span>💰 Precio</span><strong>S/ ${parseFloat(match.precio).toFixed(2)}</strong></div>
        <div class="info-row"><span>🏷 Código</span><strong>${match.codigo}</strong></div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="resultado nohay">
        <div class="emoji">❌</div>
        <div class="status">SIN STOCK</div>
        <div style="font-size:13px;color:#721c24;margin-top:6px;">No hay ${color.toUpperCase()} talla ${talla.toUpperCase()}</div>
      </div>`;
  }
}

function extraerNombreBase(descripcion) {
  let palabras = descripcion.toLowerCase().split(" ");
  palabras = palabras.filter(p =>
    !TALLAS.map(t=>t.toLowerCase()).includes(p) &&
    !COLORES.map(c=>c.toLowerCase()).includes(p)
  );
  return palabras.join(" ").trim();
}
</script>
</body>
</html>
