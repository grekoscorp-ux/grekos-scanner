<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grekos Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f0f0; min-height: 100vh; }
  .header { background: #111; color: white; padding: 16px 20px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
  .header p { font-size: 11px; color: #888; margin-top: 2px; }
  .container { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  /* Búsqueda manual (solo para pruebas) */
  .search-group { display: flex; gap: 8px; }
  .search-group input { flex: 1; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; }
  .search-group input:focus { border-color: #111; }
  .btn-buscar { background: #111; color: white; border: none; border-radius: 8px; padding: 12px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  /* Foto slider */
  .foto-slider { position: relative; width: 100%; height: 220px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .foto-slider img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
  .foto-slider img.active { opacity: 1; }
  .foto-slider .no-foto { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 13px; }
  .foto-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
  .foto-dots span { width: 8px; height: 8px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.2s; }
  .foto-dots span.active { background: #111; }

  /* Producto */
  .producto-nombre { font-size: 17px; font-weight: 800; color: #111; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
  .filtros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
  .filtro-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  select { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: white; outline: none; cursor: pointer; }
  select:focus { border-color: #111; }

  /* Resultado */
  .resultado { border-radius: 12px; padding: 24px 20px; text-align: center; margin-top: 4px; }
  .resultado.hay { background: #d4edda; border: 2px solid #28a745; }
  .resultado.nohay { background: #f8d7da; border: 2px solid #dc3545; }
  .resultado .emoji { font-size: 50px; margin-bottom: 6px; }
  .resultado .status { font-size: 24px; font-weight: 800; }
  .resultado.hay .status { color: #155724; }
  .resultado.nohay .status { color: #721c24; }
  .stock-num { font-size: 48px; font-weight: 900; color: #155724; margin: 4px 0; }
  .stock-label { font-size: 12px; color: #155724; margin-bottom: 12px; }
  .ubicacion-box { background: rgba(255,255,255,0.7); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .ubicacion-box span { font-size: 15px; font-weight: 700; color: #155724; }

  .hidden { display: none; }
  .spinner { text-align: center; padding: 30px; color: #888; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>GREKOS SCANNER</h1>
  <p>Sistema de inventario</p>
</div>

<div class="container">

  <!-- Búsqueda manual solo para pruebas -->
  <div class="card" id="cardBusqueda">
    <div class="label">Buscar por código (prueba)</div>
    <div class="search-group">
      <input type="text" id="inputCodigo" placeholder="Ej: P001" onkeydown="if(event.key==='Enter') iniciar(this.value.trim())" />
      <button class="btn-buscar" onclick="iniciar(document.getElementById('inputCodigo').value.trim())">Buscar</button>
    </div>
  </div>

  <div id="spinnerBusqueda" class="spinner hidden">Cargando producto...</div>

  <!-- Card producto -->
  <div class="card hidden" id="cardProducto">

    <!-- Foto slider -->
    <div class="foto-slider" id="fotoSlider">
      <div class="no-foto" id="noFoto">Sin fotos aún</div>
    </div>
    <div class="foto-dots" id="fotoDots"></div>

    <div class="producto-nombre" id="nombreProducto"></div>
    <div class="label">Selecciona variante</div>
    <div class="filtros-grid">
      <div>
        <div class="filtro-label">Color</div>
        <select id="selectColor" onchange="onColorChange()">
          <option value="">-- Color --</option>
        </select>
      </div>
      <div>
        <div class="filtro-label">Talla</div>
        <select id="selectTalla" onchange="verificarStock()">
          <option value="">-- Talla --</option>
        </select>
      </div>
    </div>
    <div id="resultadoStock"></div>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwjZJ9u_9Wee43Q9Hd-KGzJvPcwzKp4YlDUJ9R-I_S1fuNz0sg6AAuwhXnA0E7r_xvtow/exec";

const COLORES = ["negro","blanco","rojo","azul","plomo","celeste","verde","amarillo","rosado","morado","camuflado","gris","naranja","ngr","blc","plm","cls","cmf","amr","rsd","mrd"];
const TALLAS  = ["XS","S","M","L","XL","XXL","XXXL","28","29","30","31","32","33","34","36","38","40","42","44","UNICA"];

let todosLosProductos = [];
let fotosActuales = [];
let fotoIndex = 0;

// Al cargar la página, leer el código de la URL
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("codigo");
  if (codigo) {
    document.getElementById("cardBusqueda").classList.add("hidden");
    iniciar(codigo);
  }
};

async function iniciar(codigo) {
  if (!codigo) return;
  document.getElementById("spinnerBusqueda").classList.remove("hidden");
  document.getElementById("cardProducto").classList.add("hidden");
  try {
    const res = await fetch(`${API}?codigo=${encodeURIComponent(codigo)}`);
    const data = await res.json();
    if (!data || data.length === 0) {
      document.getElementById("spinnerBusqueda").classList.add("hidden");
      alert("Producto no encontrado: " + codigo);
      return;
    }
    const nombreBase = extraerNombreBase(data[0].descripcion);
    const colorEscaneado = extraerColor(data[0].descripcion);
    await cargarVariantes(nombreBase, colorEscaneado);
  } catch(e) {
    document.getElementById("spinnerBusqueda").classList.add("hidden");
    alert("Error al conectar con el inventario");
  }
}

async function cargarVariantes(nombreBase, colorEscaneado) {
  try {
    const res = await fetch(`${API}?busqueda=${encodeURIComponent(nombreBase)}`);
    const data = await res.json();
    document.getElementById("spinnerBusqueda").classList.add("hidden");
    if (!data || data.length === 0) { alert("Sin variantes"); return; }
    todosLosProductos = data;

    const coloresSet = new Set();
    const tallasSet  = new Set();
    data.forEach(p => {
      const desc  = p.descripcion.toLowerCase();
      const words = desc.split(" ");
      COLORES.forEach(c => { if (desc.includes(c.toLowerCase())) coloresSet.add(c); });
      TALLAS.forEach(t  => { if (words.includes(t.toLowerCase()))  tallasSet.add(t); });
    });

    document.getElementById("nombreProducto").textContent = nombreBase.toUpperCase();
    llenarSelect("selectColor", [...coloresSet], colorEscaneado);
    llenarSelect("selectTalla",  [...tallasSet], null);
    document.getElementById("cardProducto").classList.remove("hidden");

    // Cargar fotos del color escaneado
    cargarFotos(colorEscaneado || [...coloresSet][0] || "");
    verificarStock();
  } catch(e) {
    document.getElementById("spinnerBusqueda").classList.add("hidden");
    alert("Error al cargar variantes");
  }
}

function llenarSelect(id, opciones, valorDefecto) {
  const sel = document.getElementById(id);
  const esColor = id === "selectColor";
  sel.innerHTML = `<option value="">-- ${esColor ? "Color" : "Talla"} --</option>`;
  opciones.forEach(op => {
    const opt = document.createElement("option");
    opt.value = op;
    opt.textContent = op.toUpperCase();
    if (valorDefecto && op.toLowerCase() === valorDefecto.toLowerCase()) opt.selected = true;
    sel.appendChild(opt);
  });
}

function onColorChange() {
  const color = document.getElementById("selectColor").value;
  cargarFotos(color);
  verificarStock();
}

// Por ahora fotos vacías — se conectará a Google Drive en el siguiente paso
function cargarFotos(color) {
  const slider = document.getElementById("fotoSlider");
  const dots   = document.getElementById("fotoDots");
  // Limpiar fotos anteriores
  slider.querySelectorAll("img").forEach(el => el.remove());
  dots.innerHTML = "";
  fotosActuales = [];
  fotoIndex = 0;
  document.getElementById("noFoto").style.display = "flex";

  // TODO: aquí se cargarán las fotos de Google Drive por producto/color
  // Por ahora muestra "Sin fotos aún"
}

function mostrarFoto(index) {
  fotosActuales.forEach((img, i) => img.classList.toggle("active", i === index));
  document.querySelectorAll("#fotoDots span").forEach((d, i) => d.classList.toggle("active", i === index));
  fotoIndex = index;
}

function verificarStock() {
  const color = document.getElementById("selectColor").value;
  const talla = document.getElementById("selectTalla").value;
  if (!color || !talla) { document.getElementById("resultadoStock").innerHTML = ""; return; }

  const match = todosLosProductos.find(p => {
    const desc  = p.descripcion.toLowerCase();
    const words = desc.split(" ");
    return desc.includes(color.toLowerCase()) && words.includes(talla.toLowerCase());
  });

  const div = document.getElementById("resultadoStock");
  if (match && parseInt(match.stock) > 0) {
    div.innerHTML = `
      <div class="resultado hay">
        <div class="emoji">✅</div>
        <div class="status">HAY STOCK</div>
        <div class="stock-num">${match.stock}</div>
        <div class="stock-label">unidades disponibles</div>
        <div class="ubicacion-box"><span>📍 ${match.ubicacion || "Sin ubicación"}</span></div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="resultado nohay">
        <div class="emoji">❌</div>
        <div class="status">SIN STOCK</div>
        <div style="font-size:13px;color:#721c24;margin-top:8px;">No hay <strong>${color.toUpperCase()}</strong> talla <strong>${talla.toUpperCase()}</strong></div>
      </div>`;
  }
}

function extraerNombreBase(descripcion) {
  let palabras = descripcion.toLowerCase().split(" ");
  palabras = palabras.filter(p =>
    !TALLAS.map(t=>t.toLowerCase()).includes(p) &&
    !COLORES.map(c=>c.toLowerCase()).includes(p)
  );
  return palabras.join(" ").trim();
}

function extraerColor(descripcion) {
  const desc = descripcion.toLowerCase();
  return COLORES.find(c => desc.includes(c.toLowerCase())) || null;
}
</script>
</body>
</html>
